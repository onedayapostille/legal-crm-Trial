# Secrets (DATABASE_URL, JWT_SECRET, …) are passed at RUNTIME, never baked into
# the image. `env_file: .env` loads them from your git-ignored .env file. You can
# also inject them from your orchestrator/secret store instead of a file.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Loads DATABASE_URL / JWT_SECRET / etc. from .env at run time.
    env_file: .env
    # Alternatively (or in addition) pass individual values explicitly:
    # environment:
    #   DATABASE_URL: ${DATABASE_URL}
    #   JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    # Uncomment `depends_on` if you enable the local `db` service below.
    # depends_on:
    #   - db

  # ── Optional local PostgreSQL for development ────────────────────────────────
  # Uncomment to run a throwaway local database. Then set, in your .env:
  #   DATABASE_URL=postgresql://postgres:postgres@db:5432/legal_crm
  # ("db" is the service hostname from inside compose; use localhost:5432 from
  # your host machine). Do NOT use these demo credentials in production.
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: legal_crm
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped

# volumes:
#   pgdata:
