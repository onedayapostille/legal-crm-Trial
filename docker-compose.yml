services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Secrets are NEVER hard-coded here. Each value below is a placeholder
    # reference resolved at runtime from the container's environment (e.g. an
    # .env file, or the hosting platform's Environment Variables settings).
    # See README → "Deployment" and ".env.example".
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    restart: unless-stopped
