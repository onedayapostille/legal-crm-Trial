services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Secrets are NEVER hard-coded here. Each value below is a placeholder
    # reference resolved at runtime from the container's environment (e.g. an
    # .env file, or the hosting platform's Environment Variables settings).
    # See README → "Deployment" and ".env.example".
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # AI Assistant (NVIDIA NIM) — server-side only. Only NVIDIA_API_KEY must be
      # supplied; base URL and model fall back to working defaults if unset.
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-google/diffusiongemma-26b-a4b-it}
    restart: unless-stopped
